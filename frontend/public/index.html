<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="description" content="AcadAssist - AI-Powered Learning Assistant with LLM, Question Generator, Live Discussions, and Study Analytics" />
    <meta name="keywords" content="academic, learning, AI, chatbot, education, students, study, pomodoro, questions" />
    <meta name="author" content="Mystic Coders" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="AcadAssist - AI Powered Learning" />
    <meta property="og:description" content="Empowering students with AI-driven learning. Access syllabi, generate questions, chat with AI tutors, and collaborate with peers." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smartacademicportal.com" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AcadAssist" />
    <meta name="twitter:description" content="AI-Powered Learning Assistant for Students" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192.png" />
    
    <!-- Manifest for PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" type="image/x-icon" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <title>AcadAssist | AI-Powered Learning Assistant</title>
    
    <style>
        /* Critical CSS for initial load */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 50%, #faf5ff 100%);
            min-height: 100vh;
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
                color: #e2e8f0;
            }
        }
        
        /* Loading screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0ea5e9 0%, #7c3aed 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 500;
        }
        
        .loading-logo {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        /* Offline banner */
        #offline-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #ef4444;
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 0.875rem;
            z-index: 10000;
        }
        
        #offline-banner.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-logo">🎓</div>
        <div class="loader"></div>
        <p class="loading-text">Loading AcadAssist...</p>
    </div>
    
    <!-- Offline Banner -->
    <div id="offline-banner">
        ⚠️ You are currently offline. Some features may be unavailable.
    </div>
    
    <!-- Main App Root -->
    <div id="root"></div>
    
    <!-- Hide loading screen when React loads -->
    <script>
        // Check online status
        window.addEventListener('online', () => {
            document.getElementById('offline-banner').classList.remove('show');
        });
        
        window.addEventListener('offline', () => {
            document.getElementById('offline-banner').classList.add('show');
        });
        
        // Initial online check
        if (!navigator.onLine) {
            document.getElementById('offline-banner').classList.add('show');
        }
        
        // Hide loading screen when app is ready
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.classList.add('hidden');
                    setTimeout(() => {
                        if (loadingScreen.parentNode) {
                            loadingScreen.parentNode.removeChild(loadingScreen);
                        }
                    }, 500);
                }
            }, 1500);
        });
        
        // Fallback: Hide loading screen after 5 seconds
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
                loadingScreen.classList.add('hidden');
                setTimeout(() => {
                    if (loadingScreen.parentNode) {
                        loadingScreen.parentNode.removeChild(loadingScreen);
                    }
                }, 500);
            }
        }, 5000);
        
        // Register service worker for PWA
        if ('serviceWorker' in navigator && true) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js')
                    .then(registration => {
                        console.log('SW registered:', registration);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
    
    <!-- Noscript fallback -->
    <noscript>
        <div style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        ">
            <div style="font-size: 4rem; margin-bottom: 20px;">🚫</div>
            <h1 style="font-size: 2rem; margin-bottom: 10px; color: #1e293b;">
                JavaScript is Required
            </h1>
            <p style="font-size: 1.1rem; color: #64748b; max-width: 500px;">
                AcadAssist requires JavaScript to run. 
                Please enable JavaScript in your browser settings to access 
                the AI-powered learning platform.
            </p>
            <div style="margin-top: 30px; padding: 20px; background: #f1f5f9; border-radius: 12px; max-width: 400px;">
                <p style="font-weight: 600; margin-bottom: 10px;">📋 How to enable JavaScript:</p>
                <ol style="text-align: left; color: #475569; line-height: 1.8;">
                    <li>Open your browser settings</li>
                    <li>Search for "JavaScript"</li>
                    <li>Enable JavaScript</li>
                    <li>Refresh this page</li>
                </ol>
            </div>
            <p style="margin-top: 40px; color: #94a3b8; font-size: 0.9rem;">
                🎓 AcadAssist | Mystic Coders
            </p>
        </div>
    </noscript>
</body>
</html>
